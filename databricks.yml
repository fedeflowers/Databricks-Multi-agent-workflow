bundle:
  name: Databricks-Multi-agent-workflow
  version: 1.0.0
  description: Multi-agent workflow with MCP server for table interrogation

assets:
  mcp_server:
    type: python_app
    script: bundle/mcp_server/mcp_server.py
    environment:
      python: 3.11
      requirements:
        - fastapi
        - uvicorn
        - pydantic
        - databricks-sql-connector
    serving:
      compute_kind: serverless
      app_kind: REST
      endpoints:
        - /api/query_products
        - /api/query_sales
        - /api/query_inventory
        - /api/query_employees
        - /api/query_guidelines
    environment_variables:
      PRADA_CATALOG: prada_catalog
      PRADA_SCHEMA: plsa
      # References the 'secrets' scope and keys you created via CLI
      DATABRICKS_HOST: ${bundle.secrets.secrets.db_host}
      DATABRICKS_HTTP_PATH: ${bundle.secrets.secrets.db_http_path}
      DATABRICKS_TOKEN: ${bundle.secrets.secrets.db_token}
    permissions:
      - principal: managers
        level: CAN_RUN
      - principal: ai_engineers
        level: CAN_VIEW

targets:
  dev:
    workspace:
      # Update this to your actual workspace URL
      host: https://dbc-602e7a0c-98a0.cloud.databricks.com/
    assets:
      - mcp_server