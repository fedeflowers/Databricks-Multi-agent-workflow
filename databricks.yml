bundle:
  name: Databricks-Multi-agent-workflow

resources:
  apps:
    plsa-app:
      name: "plsa-app"
      description: "Prada Localized Shop Analytics - Multi-Agent Chatbot"
      source_code_path: .
      config:
        command:
          - "streamlit"
          - "run"
          - "src/app.py"
      resources:
        - name: "serving-endpoint"
          description: "Serving endpoint for the LLM"
          serving_endpoint:
            name: "databricks-meta-llama-3-1-8b-instruct"
            permission: CAN_QUERY
        - name: "DATABRICKS_HTTP_PATH"
          secret:
            scope: "secrets"
            key: "db_http_path"
            permission: READ

targets:
  dev:
    workspace:
      # Update this to your actual workspace URL if needed, or use CLI config
      host: https://dbc-602e7a0c-98a0.cloud.databricks.com/
