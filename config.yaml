# PLSA Configuration

system:
  project_name: "Prada Localized Shop Analytics"
  version: "2.0.0"
  log_level: "INFO"

agents:
  supervisor:
    model: "databricks-meta-llama-3-1-8b-instruct"
  inventory_analyst:
    genie_space_id: "01f11fb047c017cca3c6a3f707ef079a"
  visual_merchandiser:
    vector_search_endpoint: "prada_vs_endpoint"
    vector_search_index: "prada_catalog.plsa.vector_search_employee"
  creative_analyst:
    catalog: "prada_catalog"
    schema: "plsa"
    uc_functions:
      - "prada_catalog.plsa.query_products"
      - "prada_catalog.plsa.query_sales"
      - "prada_catalog.plsa.query_inventory"

mlflow:
  tracking_uri: "databricks"
  experiment_path: "/Shared/PLSA_Experiment"

# Credentials will be injected via environment variables in Databricks Apps
sql:
  hostname: "${DATABRICKS_HOST}"
  http_path: "${DATABRICKS_HTTP_PATH}"
  token: "${DATABRICKS_TOKEN}"
